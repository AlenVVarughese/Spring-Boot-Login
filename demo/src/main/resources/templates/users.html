<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard">
        <nav class="navbar">
            <h3>Java School</h3>
            <a th:href="@{/dashboard}" class="btn-small">Back</a>
        </nav>
        <div class="content">
            <h1>All Users</h1>
            <table class="user-table">
                <tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.role}"></td>
                    <td>
                        <a th:href="@{/users/edit/{id}(id=${u.id})}" class="btn-small">Edit</a>
                        <a th:href="@{/users/delete/{id}(id=${u.id})}" class="btn-small logout"
                           onclick="return confirm('Delete this user?')">Delete</a>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</body>
<script th:src="@{/js/animations.js}"></script>
</html>
