<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <nav class="navbar">
            <h3>Admin Panel</h3>
            <div>
                <a th:href="@{/admin/registrations}" class="btn-small">Registrations</a>
                <a th:href="@{/admin/courses}" class="btn-small">Courses</a>
                <a th:href="@{/admin/reset-requests}" class="btn-small">Reset Requests</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button type="submit" class="btn-small logout">Logout</button>
                </form>
            </div>
        </nav>
        <div class="content">
            <h1>Dashboard Overview</h1>

            <div class="stats-row">
                <div class="stat-card tilt-card">
                    <h2 th:text="${totalStudents}">0</h2>
                    <p>Total Enrollments</p>
                </div>
                <div class="stat-card tilt-card">
                    <h2 th:text="${totalCourses}">0</h2>
                    <p>Total Courses</p>
                </div>
            </div>

            <div class="chart-card tilt-card">
                <h3>Students per Course</h3>
                <canvas id="courseChart" height="100"></canvas>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const courseCounts = /*[[${courseCounts}]]*/ {};
        const labels = Object.keys(courseCounts);
        const values = Object.values(courseCounts);

        const ctx = document.getElementById('courseChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, '#764ba2');
        gradient.addColorStop(1, '#667eea');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Students Enrolled',
                    data: values,
                    backgroundColor: gradient,
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
    </script>
    <script th:src="@{/js/animations.js}"></script>
</body>
</html>
