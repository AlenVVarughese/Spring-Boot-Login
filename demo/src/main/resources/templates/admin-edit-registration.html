<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width:480px;">
            <h2>Edit Registration</h2>
            <form th:action="@{/admin/registrations/update/{id}(id=${registration.id})}"
                  th:object="${registration}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{studentName}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" th:field="*{phone}" required>
                </div>
                <div class="form-group">
                    <label>Course</label>
                    <input type="text" th:field="*{course}" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" th:field="*{address}" required>
                </div>
                <button type="submit" class="btn">Update</button>
            </form>
            <p class="switch"><a th:href="@{/admin/registrations}">Cancel</a></p>
        </div>
    </div>
</body>
</html>
