<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard">
        <nav class="navbar">
            <h3>Admin Panel</h3>
            <div>
                <a th:href="@{/admin/dashboard}" class="btn-small">Dashboard</a>
                <a th:href="@{/admin/registrations}" class="btn-small">Registrations</a>
                <a th:href="@{/admin/reset-requests}" class="btn-small">Reset Requests</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button type="submit" class="btn-small logout">Logout</button>
                </form>
            </div>
        </nav>
        <div class="content">
            <h1>Manage Courses</h1>

            <div class="auth-card tilt-card" style="max-width:420px;margin-bottom:30px;">
                <h3>Add New Course</h3>
                <form th:action="@{/admin/courses/add}" th:object="${course}" method="post">
                    <div class="form-group">
                        <label>Course Name</label>
                        <input type="text" th:field="*{name}" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" th:field="*{description}">
                    </div>
                    <button type="submit" class="btn">Add Course</button>
                </form>
            </div>

            <table class="user-table">
                <tr><th>ID</th><th>Name</th><th>Description</th><th>Action</th></tr>
                <tr th:each="c : ${courses}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.name}"></td>
                    <td th:text="${c.description}"></td>
                    <td>
                        <a th:href="@{/admin/courses/delete/{id}(id=${c.id})}" class="btn-small logout"
                           onclick="return confirm('Delete this course?')">Delete</a>
                    </td>
                </tr>
            </table>
        </div>
    </div>
    <script th:src="@{/js/animations.js}"></script>
</body>
</html>
