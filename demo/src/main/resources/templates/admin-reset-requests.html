<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Requests</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard">
        <nav class="navbar">
            <h3>Admin Panel</h3>
            <div>
                <a th:href="@{/admin/dashboard}" class="btn-small">Dashboard</a>
                <a th:href="@{/admin/registrations}" class="btn-small">Registrations</a>
                <a th:href="@{/admin/courses}" class="btn-small">Courses</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button type="submit" class="btn-small logout">Logout</button>
                </form>
            </div>
        </nav>
        <div class="content">
            <h1>Pending Password Reset Requests</h1>
            <table class="user-table">
                <tr><th>Username</th><th>Requested At</th><th>Set New Password</th></tr>
                <tr th:each="r : ${requests}">
                    <td th:text="${r.username}"></td>
                    <td th:text="${r.requestedAt}"></td>
                    <td>
                        <form th:action="@{/admin/reset-requests/resolve/{id}(id=${r.id})}" method="post"
                              style="display:flex;gap:8px;">
                            <input type="password" name="newPassword" placeholder="New password" required
                                   style="padding:6px;border-radius:6px;border:1px solid #ccc;">
                            <button type="submit" class="btn-small">Save</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(requests)}">
                    <td colspan="3">No pending requests</td>
                </tr>
            </table>
        </div>
    </div>
    <script th:src="@{/js/animations.js}"></script>
</body>
</html>
