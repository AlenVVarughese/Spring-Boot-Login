<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width:480px;">
            <h2>Course Registration</h2>
            <p class="subtitle">Fill your details to register for a course</p>

            <p th:if="${error}" class="msg error" th:text="${error}"></p>

            <form th:action="@{/student/course-form}" th:object="${registration}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{studentName}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" th:field="*{phone}" required>
                </div>
                <div class="form-group">
                    <label>Course</label>
                   <select th:field="*{course}" required>
    <option value="">-- Select Course --</option>
    <option th:each="c : ${courses}" th:value="${c.name}" th:text="${c.name}"></option>
</select>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" th:field="*{address}" required>
                </div>
                <button type="submit" class="btn">Submit Registration</button>
            </form>
            <form th:action="@{/logout}" method="post" style="margin-top:12px;">
                <button type="submit" class="btn" style="background:#e74c3c;">Logout</button>
            </form>
        </div>
    </div>
</body>
<script th:src="@{/js/animations.js}"></script>
</html>
