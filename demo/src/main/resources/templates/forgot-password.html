<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card tilt-card">
            <h2>Forgot Password</h2>
            <p class="subtitle">We'll notify the admin to reset it for you</p>

            <p th:if="${error}" class="msg error" th:text="${error}"></p>
            <p th:if="${success}" class="msg success" th:text="${success}"></p>

            <form th:action="@{/forgot-password}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <button type="submit" class="btn">Send Request to Admin</button>
            </form>
            <p class="switch"><a th:href="@{/login}">Back to login</a></p>
        </div>
    </div>
    <script th:src="@{/js/animations.js}"></script>
</body>
</html>
